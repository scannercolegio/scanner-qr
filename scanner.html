<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner QR — Colegio Integral</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: white;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .header img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #667eea;
      margin-bottom: 10px;
      object-fit: cover;
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 0.8rem;
      color: #a0aec0;
      margin-top: 3px;
    }

    /* SELECTOR ENTRADA/SALIDA */
    .movimiento-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 6px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
    }

    .mov-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: #a0aec0;
    }

    .mov-btn.entrada.active {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      box-shadow: 0 4px 15px rgba(39,174,96,0.4);
    }

    .mov-btn.salida.active {
      background: linear-gradient(135deg, #e67e22, #f39c12);
      color: white;
      box-shadow: 0 4px 15px rgba(230,126,34,0.4);
    }

    .mov-btn:not(.active):hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    /* CONTENEDOR SCANNER */
    .scanner-wrapper {
      width: 100%;
      max-width: 380px;
      position: relative;
    }

    .scanner-box {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(102,126,234,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      aspect-ratio: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    canvas { display: none; }

    /* OVERLAY DEL SCANNER */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 200px;
      height: 200px;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #00ff88;
      border-style: solid;
    }

    .scan-frame::before {
      top: 0; left: 0;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0;
    }

    .scan-frame::after {
      bottom: 0; right: 0;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0;
    }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #00ff88;
      border-style: solid;
    }

    .corner-tr {
      top: 0; right: 0;
      border-width: 3px 3px 0 0;
      border-radius: 0 4px 0 0;
    }

    .corner-bl {
      bottom: 0; left: 0;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 4px;
    }

    /* LÍNEA DE ESCANEO */
    .scan-line {
      position: absolute;
      top: 0;
      left: 10px;
      right: 10px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
      animation: scanLine 2s linear infinite;
      border-radius: 2px;
      box-shadow: 0 0 8px #00ff88;
    }

    @keyframes scanLine {
      0% { top: 10px; opacity: 1; }
      90% { opacity: 1; }
      100% { top: 190px; opacity: 0; }
    }

    /* SOMBRA ALREDEDOR DEL FRAME */
    .scan-shadow {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 9999px rgba(0,0,0,0.45);
      pointer-events: none;
    }

    /* BOTÓN ACTIVAR */
    .btn-activar {
      width: 100%;
      max-width: 380px;
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
      transition: all 0.3s ease;
    }

    .btn-activar:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(102,126,234,0.5);
    }

    .btn-activar:active {
      transform: translateY(0);
    }

    /* STATUS */
    .status-bar {
      width: 100%;
      max-width: 380px;
      margin-top: 15px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: #a0aec0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a0aec0;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .status-dot.activo {
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: pulse 1.5s infinite;
    }

    .status-dot.error {
      background: #e74c3c;
      box-shadow: 0 0 8px #e74c3c;
    }

    .status-dot.exito {
      background: #27ae60;
      box-shadow: 0 0 8px #27ae60;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    /* RESULTADO */
    .resultado-card {
      width: 100%;
      max-width: 380px;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .resultado-card.exito {
      background: rgba(39,174,96,0.15);
      border: 1px solid rgba(39,174,96,0.4);
      color: #2ecc71;
      display: flex;
    }

    .resultado-card.error {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.4);
      color: #e74c3c;
      display: flex;
    }

    /* FOOTER */
    .footer {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #4a5568;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="https://firebasestorage.googleapis.com/v0/b/apps-franklin.appspot.com/o/Colegio%20Integral%20El%20Adelanto%2FLogo%20Colegio%202025.jpeg?alt=media&token=2f2a30dc-888f-4983-8e2d-bca2fe6ef730" alt="Logo">
    <h1>COLEGIO INTEGRAL CIENCIA Y DESARROLLO</h1>
    <p>Sistema de Registro de Asistencia</p>
  </div>

  <!-- SELECTOR ENTRADA / SALIDA -->
  <div class="movimiento-selector">
    <button class="mov-btn entrada active" id="btnEntrada" onclick="setMovimiento('ENTRADA')">
      ✅ ENTRADA
    </button>
    <button class="mov-btn salida" id="btnSalida" onclick="setMovimiento('SALIDA')">
      🚪 SALIDA
    </button>
  </div>

  <!-- SCANNER -->
  <div class="scanner-wrapper">
    <div class="scanner-box" id="scannerBox">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay" id="scanOverlay" style="display:none;">
        <div class="scan-shadow"></div>
        <div class="scan-frame">
          <div class="corner-tr"></div>
          <div class="corner-bl"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTÓN ACTIVAR -->
  <button class="btn-activar" id="btnIniciar" onclick="iniciarCamara()">
    📷 Activar Cámara
  </button>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Presiona "Activar Cámara" para comenzar</span>
  </div>

  <!-- RESULTADO -->
  <div class="resultado-card" id="resultadoCard">
    <span id="resultadoIcon">✅</span>
    <span id="resultadoTexto"></span>
  </div>

  <div class="footer">© 2026 Colegio Integral Ciencia y Desarrollo</div>

  <script type="module">
    const jsQR = (await import('https://esm.sh/jsqr@1.4.0')).default;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const resultadoCard = document.getElementById('resultadoCard');
    const resultadoTexto = document.getElementById('resultadoTexto');
    const resultadoIcon = document.getElementById('resultadoIcon');
    const scanOverlay = document.getElementById('scanOverlay');
    const btnIniciar = document.getElementById('btnIniciar');

    let scanning = false;
    let lastCode = '';
    let lastTime = 0;
    let movimiento = 'ENTRADA';
    const opener = window.opener;

    // Cambiar movimiento
    window.setMovimiento = function(tipo) {
      movimiento = tipo;
      document.getElementById('btnEntrada').classList.toggle('active', tipo === 'ENTRADA');
      document.getElementById('btnSalida').classList.toggle('active', tipo === 'SALIDA');
    };

    function setStatus(texto, tipo) {
      statusText.textContent = texto;
      statusDot.className = 'status-dot ' + (tipo || '');
    }

    function mostrarResultado(texto, tipo) {
      resultadoCard.className = 'resultado-card ' + tipo;
      resultadoIcon.textContent = tipo === 'exito' ? '✅' : '❌';
      resultadoTexto.textContent = texto;
      setTimeout(() => {
        resultadoCard.className = 'resultado-card';
      }, 3000);
    }

    // Iniciar cámara
    window.iniciarCamara = async function() {
      try {
        btnIniciar.style.display = 'none';
        setStatus('Iniciando cámara...', '');

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }
        });

        video.srcObject = stream;
        await video.play();

        scanOverlay.style.display = 'flex';
        setStatus('Esperando código QR...', 'activo');
        scanning = true;
        requestAnimationFrame(scanFrame);

      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
        btnIniciar.style.display = 'flex';
        if (opener) {
          opener.postMessage({ tipo: 'error_camara', mensaje: err.message }, '*');
        }
      }
    };

    function scanFrame() {
      if (!scanning) {
        requestAnimationFrame(scanFrame);  // Seguir el loop aunque no esté escaneando
        return;
      }

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'dontInvert'
        });

        if (code) {
          const now = Date.now();
          if (code.data !== lastCode || (now - lastTime) > 3000) {
            lastCode = code.data;
            lastTime = now;

            setStatus('✅ Código escaneado — ' + movimiento, 'exito');
            mostrarResultado('Código enviado: ' + code.data, 'exito');

            if (opener) {
              opener.postMessage({
                tipo: 'qr_escaneado',
                codigo: code.data,
                movimiento: movimiento
              }, '*');
            }

            // Pausar 3 segundos antes de volver a escanear
            scanning = false;
            setTimeout(() => {
              lastCode = '';  // Limpiar último código para permitir el mismo QR
              scanning = true;
              setStatus('Esperando código QR...', 'activo');
            }, 3000);
          }
        }
      }

      requestAnimationFrame(scanFrame);  // Siempre continuar el loop
    }
  </script>
</body>
</html>
