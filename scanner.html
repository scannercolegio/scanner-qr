<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner QR</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #000; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; }
    #status { color: white; text-align: center; padding: 10px; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="status">Iniciando cámara...</div>
  <div id="reader"></div>

  <script>
    const scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        window.parent.postMessage({ tipo: 'qr_escaneado', codigo: decodedText }, '*');
        document.getElementById('status').textContent = 'Código escaneado: ' + decodedText;
      },
      () => {}
    ).then(() => {
      document.getElementById('status').textContent = 'Esperando código QR...';
    }).catch(err => {
      document.getElementById('status').textContent = 'Error: ' + err;
      window.parent.postMessage({ tipo: 'error_camara', mensaje: err.toString() }, '*');
    });
  </script>
</body>
</html>
